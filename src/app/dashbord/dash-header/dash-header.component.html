<header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
  <div>
    <h1 class="text-3xl font-extrabold tracking-tight text-primary">Tableau de Bord</h1>
    <p class="text-on-surface-variant">Welcome back, Curator. Here is your Mediterranean performance overview.</p>
  </div>

  <div class="flex items-center gap-3">
    <button class="bg-red-600 text-white px-4 py-2.5 rounded-md font-semibold hover:bg-red-700 transition-colors flex items-center gap-2" type="button" (click)="logout()">
      <span class="material-symbols-outlined text-sm">logout</span>
      <span>Deconnexion</span>
    </button>
    <button class="bg-surface-container-lowest text-on-surface border border-outline-variant/20 px-4 py-2.5 rounded-md flex items-center gap-2 hover:bg-surface-container-high transition-colors" type="button">
      <span class="material-symbols-outlined text-sm">download</span>
      <span class="text-sm font-semibold">Export Data</span>
    </button>
    <button class="bg-primary text-white px-6 py-2.5 rounded-md font-semibold hover:opacity-90 transition-opacity flex items-center gap-2" type="button">
      <span class="material-symbols-outlined text-sm">add</span>
      <span>New Listing</span>
    </button>
  </div>
</header>
